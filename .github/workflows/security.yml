name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also run weekly on Sunday at midnight so you catch new advisories
  # even without a code push
  schedule:
    - cron: '0 0 * * 0'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        # --audit-level=high means only fail the job for high/critical issues,
        # not low/moderate — keeping the pipeline green for minor advisories
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities with audit-ci
        run: npx audit-ci --high
        continue-on-error: true   # report but don't block deploy

      - name: Scan for secrets accidentally committed
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true